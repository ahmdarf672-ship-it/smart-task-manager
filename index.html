<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="master.css" />
    <title>مدير المهام الذكي | Smart Task Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Alyamama:wght@300..900&family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Scheherazade+New:wght@400;500;600;700&display=swap"
      rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Alyamama:wght@300..900&family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Cairo:wght@200..1000&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Scheherazade+New:wght@400;500;600;700&display=swap"
      rel="stylesheet" />
  </head>
  <div class="container">
    <header>
      <h1>قائمة المهام</h1>
      <div class="stats">
        <span>المهام:<b id="total-tasks">0</b></span>
        <span>المكتملة:<b id="completed-tasks">0</b></span>
      </div>
    </header>
    <div class="input-group">
      <input type="text" id="tasks-input" placeholder="ماذا تنوي فعله اليوم" />
      <button id="add-btn">إضافة</button>
    </div>
    <div class="filters">
      <button class="filter-btn active" data-filter="all">الكل</button>
      <button class="filter-btn" data-filter="pending">قيد التنفيذ</button>
      <button class="filter-btn" data-filter="completed">مكتملة</button>
    </div>
    <ul id="tasks-list"></ul>
  </div>
  <body>
    <!--JAVA LINK-->
    <script src="main.js"></script>
  </body>
</html>
